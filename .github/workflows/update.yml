name: Auto Update Coop Data

on:
  schedule:
    # يشتغل 4 مرات باليوم بأوقات مكسورة عشان ما ينعرف التحديث
    # (بتوقيت جرينتش: 2:15, 8:15, 14:15, 20:15)
    - cron: '15 2,8,14,20 * * *' 
  workflow_dispatch: # زر التشغيل اليدوي

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add live_data.json
          git commit -m "تحديث تلقائي لبيانات التدريب 🚀" || echo "لا توجد فرص جديدة للتحديث"
          git pull --rebase origin main
          git push
