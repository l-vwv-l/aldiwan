    <style>
        :root {
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
            --accent: #2563eb;
            --card-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            margin: 0; padding: 0; font-family: 'IBM Plex Sans Arabic', sans-serif;
            min-height: 100vh; display: flex; flex-direction: column; align-items: center;
            background: url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover; position: relative;
        }

        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.6); z-index: 0; }
        canvas#stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .main-container { position: relative; z-index: 10; width: 95%; max-width: 1200px; margin: 40px 0; display: flex; flex-direction: column; }

        .header-section {
            text-align: center; margin-bottom: 30px; background: var(--glass-bg); backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
        }

        .header-section h1 { color: var(--text-white); margin: 0 0 10px 0; font-size: 2rem; }
        .header-section p { color: var(--text-gray); margin: 0; font-size: 1rem; }

        /* عداد إجمالي الفرص */
        .total-badge {
            background: rgba(37, 99, 235, 0.15); border: 1px solid var(--accent); color: white;
            padding: 8px 20px; border-radius: 50px; display: inline-block; margin-top: 15px;
            font-weight: 600; font-size: 1.1rem; box-shadow: 0 0 15px rgba(37, 99, 235, 0.3);
        }
        .total-badge span { color: #f59e0b; font-weight: bold; font-size: 1.3rem; }

        .back-btn {
            position: absolute; top: 20px; right: 20px; width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; transform: scale(1.1); }

        .filters-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border); color: var(--text-gray); padding: 8px 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 0.9rem; }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .filter-btn.live-btn { border-color: #d946ef; color: #d946ef; }
        .filter-btn.live-btn:hover, .filter-btn.live-btn.active { background: #d946ef; color: white; }

        .companies-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; margin-bottom: 20px; }

        /* تصميم البطاقة مع إضافات الذكاء الاصطناعي */
        .company-card {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 35px 15px 20px 15px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative;
            -webkit-animation: fadeInUp 0.5s ease-out; animation: fadeInUp 0.5s ease-out; height: 100%; box-sizing: border-box;
        }
        .company-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(40,40,40,0.8); }
        
        .opp-number { position: absolute; top: 10px; right: 15px; background: rgba(255,255,255,0.08); color: #a1a1aa; padding: 3px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        
        /* حالة التقديم */
        .status-badge { position: absolute; top: 10px; left: 15px; padding: 3px 8px; border-radius: 8px; font-size: 0.7rem; font-weight: bold; }
        .status-open { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .status-closing { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-closed { background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); }

        .company-icon { font-size: 2.2rem; color: var(--accent); margin-bottom: 12px; }
        .company-name { color: white; font-weight: 600; margin-bottom: 5px; font-size: 1.05rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .company-tag { color: var(--text-gray); font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%; }

        .footer-info { margin-top: 30px; padding: 20px 30px; background: var(--glass-bg); backdrop-filter: blur(15px); border: 1px solid var(--glass-border); border-radius: 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .footer-logo-text { color: var(--text-gray); font-size: 0.9rem; font-weight: 600; }
        .footer-copyright { color: var(--text-gray); font-size: 0.75rem; opacity: 0.8; }

        /* --- النافذة المنبثقة المقلوبة (3D Flip Card) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .flip-container { perspective: 1000px; width: 90%; max-width: 420px; position: relative; }
        .flipper { transition: 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform-style: preserve-3d; position: relative; width: 100%; animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .flip-container.flipped .flipper { transform: rotateY(180deg); }
        .front, .back { backface-visibility: hidden; position: absolute; top: 0; left: 0; width: 100%; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 45px 25px 25px 25px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7); text-align: right; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .front { position: relative; transform: rotateY(0deg); }
        .back { transform: rotateY(180deg); height: 100%; }
        .modal-top-icon { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); background: var(--accent); width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: white; border: 4px solid #1a1a1a; box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4); }
        .modal-title { color: #ffffff; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .info-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .info-icon { color: var(--accent); font-size: 1rem; margin-top: 3px; width: 20px; text-align: center; }
        .info-text { flex: 1; }
        .info-label { color: #888; font-size: 0.75rem; display: block; margin-bottom: 2px;}
        .info-val { color: #e4e4e7; font-size: 0.9rem; word-break: break-word;}
        .modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 20px; }
        .flip-btn { background: rgba(255,255,255,0.08); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; cursor: pointer; transition: 0.3s; font-family: inherit; font-size: 0.85rem; }
        .flip-btn:hover { background: rgba(255,255,255,0.2); }
        .apply-btn { background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); }
        .apply-btn:hover { background: #1d4ed8; transform: translateY(-2px); }
        .close-cross { position: absolute; top: 15px; left: 15px; background: none; border: none; color: #ef4444; font-size: 1.5rem; cursor: pointer; z-index: 10; }

        @-webkit-keyframes fadeInUp { from { opacity: 0; -webkit-transform: translateY(15px); } to { opacity: 1; -webkit-transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        @media (max-width: 600px) {
            .header-section { padding: 20px; padding-top: 60px; }
            .header-section h1 { font-size: 1.4rem; }
            .back-btn { top: 15px; right: 15px; width: 35px; height: 35px; font-size: 0.9rem; }
            .companies-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .company-card { padding: 30px 10px 15px 10px; border-radius: 16px; }
            .company-icon { font-size: 1.6rem; margin-bottom: 8px; }
            .company-name { font-size: 0.9rem; margin-bottom: 3px; }
            .company-tag { font-size: 0.7rem; }
            .main-container { width: 92%; margin: 20px 0; }
            .filters-container { gap: 8px; }
            .filter-btn { padding: 6px 12px; font-size: 0.8rem; }
            .footer-info { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>

                    </div>

                    <div class="modal-actions">
                        <button class="flip-btn" onclick="toggleFlip()">النبذة <i class="fa-solid fa-rotate"></i></button>
                        <a href="#" id="mBtn" target="_blank" class="apply-btn">التقديم</a>
                    </div>
                </div>

                <div class="back">
                    <button class="close-cross" onclick="closeModal(null, true)"><i class="fa-solid fa-xmark"></i></button>
                    <div class="modal-top-icon" style="background: #10b981;"><i class="fa-solid fa-circle-info"></i></div>
                    <h3 class="modal-title">نبذة عن البرنامج</h3>
                    
                    <div style="flex: 1; display: flex; align-items: center; text-align: center; color: #a1a1aa; line-height: 1.8; font-size: 0.95rem; padding: 10px 0;" id="mAbout">

        let allData = [...db];

        // الخوارزمية المدعومة بالذكاء الاصطناعي
        async function fetchLiveData() {
            try {
                const response = await fetch('live_data.json?v=' + new Date().getTime());
                if(response.ok) {
                    const liveData = await response.json();
                    
                    liveData.forEach(function(liveItem) {
                        let existingIndex = db.findIndex(function(item) {
                            let t1 = item.t.toLowerCase().replace(/[^\w\s\u0600-\u06FF]/g, ' ').replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه');
                            let t2 = liveItem.t.toLowerCase().replace(/[^\w\s\u0600-\u06FF]/g, ' ').replace(/[أإآ]/g, 'ا').replace(/ة/g, 'ه');
                            let stopWords = ['شركة', 'مؤسسة', 'وزارة', 'بنك', 'مصرف', 'هيئة', 'مجموعة', 'برنامج', 'صندوق', 'ال', 'saudi', 'company'];
                            let words1 = t1.split(/\s+/).filter(w => w.length > 2 && !stopWords.includes(w));
                            let words2 = t2.split(/\s+/).filter(w => w.length > 2 && !stopWords.includes(w));
                            return words1.some(w1 => words2.some(w2 => w1 === w2 || w1.includes(w2) || w2.includes(w1)));
                        });
                        
                        if (existingIndex !== -1) {
                            db[existingIndex].e = liveItem.e; 
                            if (liveItem.m) db[existingIndex].m = liveItem.m; 
                            if (liveItem.b) db[existingIndex].b = liveItem.b; 
                            if (liveItem.a) db[existingIndex].a = liveItem.a; 
                            if (liveItem.s) db[existingIndex].s = liveItem.s; 
                            db[existingIndex].c = 'live';     
                        } else {
                            if (!liveItem.s) liveItem.s = "مفتوح";
                            db.push(liveItem);
                        }
                    });
                }
            } catch (e) {
                console.log("جاري انتظار أول تحديث من الذكاء الاصطناعي...");
            }
            
            allData = [...db];
            allData.sort(function(a, b) { return a.t > b.t ? 1 : -1; });
            allData.sort(function(a, b) { return (a.c === 'live' ? -1 : (b.c === 'live' ? 1 : 0)); });
            
            render('all');
        }

        function getStatusHtml(status) {
            if (!status) return '<div class="status-badge status-open">مفتوح</div>';
            if (status.includes("مغلق")) return '<div class="status-badge status-closed">مغلق 🔴</div>';
            if (status.includes("قريبا") || status.includes("ينتهي")) return '<div class="status-badge status-closing">قريباً ينتهي 🟠</div>';
            return '<div class="status-badge status-open">مفتوح 🟢</div>';
        }

        function render(filter) {
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';
            
            const filteredData = allData.filter(function(x) { return filter === 'all' || x.c === filter; });
            
            // تحديث العداد
            document.getElementById('totalCountSpan').innerText = filteredData.length;
            
            filteredData.forEach(function(item, index) {
                const card = document.createElement('div');
                card.className = 'company-card';
                
                if(item.c === 'live') card.style.boxShadow = '0 0 15px rgba(217, 70, 239, 0.2)';
                card.onclick = function() { openModal(item); };
                
                let iconColor = item.c === 'live' ? '#d946ef' : 'var(--accent)';
                let statusHtml = getStatusHtml(item.s);
                let numHtml = `<div class="opp-number">الفرصة رقم ${index + 1}</div>`;
                
                card.innerHTML = numHtml + statusHtml + '<div class="company-icon" style="color:'+iconColor+'"><i class="fa-solid ' + item.i + '"></i></div><div class="company-name">' + item.t + '</div><div class="company-tag">' + item.l + '</div>';
                grid.appendChild(card);
            });
        }

        function filterData(btnElement, cat) {
            const buttons = document.querySelectorAll('.filter-btn');
            for(let i=0; i<buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btnElement.classList.add('active');
            render(cat);
        }

        function toggleFlip() {
            document.getElementById('flipContainer').classList.toggle('flipped');
        }

        function openModal(item) {
            let iconColor = item.c === 'live' ? '#d946ef' : 'var(--accent)';
            document.getElementById('mTopIcon').innerHTML = '<i class="fa-solid ' + item.i + '"></i>';
            document.getElementById('mTopIcon').style.background = iconColor;

            document.getElementById('mTitle').innerText = item.t;
            document.getElementById('mLoc').innerText = item.l;
            
            let contactText = item.e;
            let linkHref = "#";
            
            if (item.e.indexOf('@') !== -1) {
                contactText = '<a href="mailto:' + item.e + '" style="color:'+iconColor+'; text-decoration:none;">' + item.e + '</a>';
                linkHref = 'mailto:' + item.e;
                document.getElementById('mBtn').innerText = "إرسال إيميل للتقديم";
            } else if (item.e.indexOf('http') === 0) {
                contactText = '<a href="' + item.e + '" target="_blank" style="color:'+iconColor+'; text-decoration:none;">رابط بوابة التقديم الرسمي</a>';
                linkHref = item.e;
                document.getElementById('mBtn').innerText = "الذهاب للتقديم";
            } else {
                contactText = item.e;
                linkHref = 'https://www.google.com/search?q=التدريب+التعاوني+' + item.t;
                document.getElementById('mBtn').innerText = "البحث في جوجل عن التقديم";
            }

            document.getElementById('mContact').innerHTML = contactText;
            document.getElementById('mMajors').innerText = item.m || 'حسب الشواغر المتاحة للشركة';
            document.getElementById('mBenefits').innerText = item.b || 'تخضع لسياسة الجهة المحددة';
            document.getElementById('mAbout').innerText = item.a || 'برنامج تدريب ميداني صُمم لتطوير وصقل مهارات الطلاب وتجهيزهم لدخول سوق العمل من خلال بيئة مهنية متكاملة.';
            
            const btn = document.getElementById('mBtn');
            btn.href = linkHref;
            btn.style.background = iconColor;

            document.getElementById('flipContainer').classList.remove('flipped');
            const modal = document.getElementById('infoModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event, isButton) {
            const modal = document.getElementById('infoModal');
            if (isButton || !event || event.target === modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function initStars() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; stars = []; for(let i=0; i<100; i++) stars.push({x:Math.random()*width, y:Math.random()*height, r:Math.random()*1.5, d:Math.random()*0.5+0.1}); }
        function drawStars() { ctx.clearRect(0,0,width,height); ctx.fillStyle="rgba(255,255,255,0.7)"; stars.forEach(function(s){ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); s.y-=s.d; if(s.y<0)s.y=height;}); requestAnimationFrame(drawStars); }
        window.addEventListener('resize', initStars); initStars(); drawStars();

        // التشغيل
        fetchLiveData();
    </script>
