<!DOCTYPE html>
<html lang="ar" dir="rtl">

    <link rel="shortcut icon" href="logo.png?v=2026" type="image/x-icon">

    <style>
        :root {
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
            --accent: #2563eb;
        }

        body {
            margin: 0; padding: 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); z-index: 0;
        }

        canvas#stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .main-container {
            position: relative; z-index: 10;
            width: 95%; max-width: 1200px;
            margin: 40px 0;
        }

        .header-section {
            text-align: center; margin-bottom: 30px;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .header-section h1 { color: var(--text-white); margin: 0 0 10px 0; font-size: 2rem; }
        .header-section p { color: var(--text-gray); margin: 0; font-size: 1rem; }

        .back-btn {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; transform: scale(1.1); }

        /* --- الفلاتر --- */
        .filters-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--text-gray); padding: 8px 20px; border-radius: 50px;
            cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 0.9rem;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* --- الشبكة --- */
        .companies-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px;
        }

        .company-card {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            /* تم إصلاح الشفافية لدعم الجوالات */
            -webkit-animation: fadeInUp 0.5s ease-out;
            animation: fadeInUp 0.5s ease-out;
        }
        .company-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(40,40,40,0.8); }
        
        .company-icon { font-size: 2rem; color: var(--accent); margin-bottom: 15px; }
        .company-name { color: white; font-weight: 600; margin-bottom: 5px; font-size: 1.1rem;}
        .company-tag { color: var(--text-gray); font-size: 0.8rem; }

        /* --- المودال (النافذة المنبثقة) --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal-content { background: #1a1a1a; border: 1px solid var(--glass-border); border-radius: 25px; padding: 30px; width: 90%; max-width: 450px; position: relative; }
        .close-modal { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: #888; font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .close-modal:hover { color: white; transform: rotate(90deg); }
        .info-row { display: flex; gap: 12px; margin-bottom: 15px; align-items: flex-start; }
        .info-label { color: #888; font-size: 0.75rem; display: block; margin-bottom: 3px;}
        .info-val { color: #fff; font-size: 0.95rem; word-break: break-word;}
        .apply-link { display: block; width: 100%; background: var(--accent); color: white; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-top: 25px; transition: 0.3s;}
        .apply-link:hover { background: #1d4ed8; transform: translateY(-2px); }

        @-webkit-keyframes fadeInUp { from { opacity: 0; -webkit-transform: translateY(15px); } to { opacity: 1; -webkit-transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 600px) {
            .header-section { padding: 20px; }
            .header-section h1 { font-size: 1.5rem; }
        }
    </style>
</head>

        // ترتيب الكروت أبجدياً ببرمجة مبسطة ومضمونة
        db.sort(function(a, b) { return a.t > b.t ? 1 : -1; });

        function render(filter) {
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';
            
            const filteredData = db.filter(function(x) { return filter === 'all' || x.c === filter; });
            
            filteredData.forEach(function(item) {
                const card = document.createElement('div');
                card.className = 'company-card';
                card.onclick = function() { openModal(item); };
                card.innerHTML = '<div class="company-icon"><i class="fa-solid ' + item.i + '"></i></div><div class="company-name">' + item.t + '</div><div class="company-tag">' + item.l + '</div>';
                grid.appendChild(card);
            });
        }

            const buttons = document.querySelectorAll('.filter-btn');
            for(let i=0; i<buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btnElement.classList.add('active');
            render(cat);
        }

        function openModal(item) {
            document.getElementById('mTitle').innerText = item.t;
            document.getElementById('mLoc').innerText = item.l;
            
            let contactText = item.e;
            let linkHref = "#";
            
            if (item.e.indexOf('@') !== -1) {
                contactText = '<a href="mailto:' + item.e + '" style="color:var(--accent); text-decoration:none;">' + item.e + '</a>';
                linkHref = 'mailto:' + item.e;
                document.getElementById('mBtn').innerText = "إرسال إيميل التقديم";
            } else if (item.e.indexOf('http') === 0) {
                contactText = '<a href="' + item.e + '" target="_blank" style="color:var(--accent); text-decoration:none;">رابط بوابة التقديم</a>';
                linkHref = item.e;
                document.getElementById('mBtn').innerText = "الذهاب للتقديم";
            } else {
                contactText = item.e;
                linkHref = 'https://www.google.com/search?q=التدريب+التعاوني+' + item.t;
                document.getElementById('mBtn').innerText = "البحث في قوقل عن الجهة";
            }

            document.getElementById('mContact').innerHTML = contactText;
            document.getElementById('mMajors').innerText = item.m || 'كافة التخصصات / حسب الشواغر المتاحة';
            
            const btn = document.getElementById('mBtn');
            btn.href = linkHref;

            const modal = document.getElementById('infoModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event, isButton) {
            const modal = document.getElementById('infoModal');
            if (isButton || !event || event.target === modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        // إعدادات النجوم
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function initStars() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; stars = []; for(let i=0; i<100; i++) stars.push({x:Math.random()*width, y:Math.random()*height, r:Math.random()*1.5, d:Math.random()*0.5+0.1}); }
        function drawStars() { ctx.clearRect(0,0,width,height); ctx.fillStyle="rgba(255,255,255,0.7)"; stars.forEach(function(s){ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); s.y-=s.d; if(s.y<0)s.y=height;}); requestAnimationFrame(drawStars); }
        window.addEventListener('resize', initStars); initStars(); drawStars();

        render('all');
    </script>
</body>
</html>
