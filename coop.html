    <style>
        :root {
            --glass-bg: rgba(30, 30, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-white: #ffffff;
            --text-gray: #a1a1aa;
            --accent: #2563eb;
            --card-bg: rgba(20, 20, 20, 0.95);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'IBM Plex Sans Arabic', sans-serif;
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: url('https://images.unsplash.com/photo-1518066000714-58c45f1a2c0a?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            position: relative;
        }

        body::before {
            content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6); z-index: 0;
        }

        canvas#stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }

        .main-container {
            position: relative; z-index: 10;
            width: 95%; max-width: 1200px;
            margin: 40px 0;
            display: flex; flex-direction: column;
        }

        .header-section {
            text-align: center; margin-bottom: 30px;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 25px; padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            position: relative;
        }

        .header-section h1 { color: var(--text-white); margin: 0 0 10px 0; font-size: 2rem; }
        .header-section p { color: var(--text-gray); margin: 0; font-size: 1rem; }

        .back-btn {
            position: absolute; top: 20px; right: 20px;
            width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; transform: scale(1.1); }

        /* --- الفلاتر --- */
        .filters-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;
        }
        .filter-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            color: var(--text-gray); padding: 8px 20px; border-radius: 50px;
            cursor: pointer; transition: 0.3s; font-weight: 600; font-size: 0.9rem;
        }
        .filter-btn:hover, .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* --- الشبكة (تصميم الكروت الجديد) --- */
        .companies-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px;
            margin-bottom: 20px;
        }

        .company-card {
            background: var(--glass-bg); backdrop-filter: blur(10px); border: 1px solid var(--glass-border);
            border-radius: 20px; padding: 25px 15px; text-align: center; cursor: pointer; transition: 0.3s;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            -webkit-animation: fadeInUp 0.5s ease-out; animation: fadeInUp 0.5s ease-out;
            height: 100%; box-sizing: border-box;
        }
        .company-card:hover { transform: translateY(-8px); border-color: var(--accent); background: rgba(40,40,40,0.8); }
        
        .company-icon { font-size: 2.2rem; color: var(--accent); margin-bottom: 12px; }
        
        .company-name { 
            color: white; font-weight: 600; margin-bottom: 5px; font-size: 1.05rem; line-height: 1.4;
            /* قص النص الذكي لو كان طويل جداً */
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .company-tag { 
            color: var(--text-gray); font-size: 0.8rem; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; width: 100%;
        }

        /* --- تذييل الصفحة (إثبات الملكية) --- */
        .footer-info {
            margin-top: 30px; padding: 20px 30px;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .footer-logo-text { color: var(--text-gray); font-size: 0.9rem; font-weight: 600; }
        .footer-copyright { color: var(--text-gray); font-size: 0.75rem; opacity: 0.8; }

        /* --- النافذة المنبثقة (تصميم الكوكيز) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 100;
            display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px);
        }

        .modal-content {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px; width: 85%; max-width: 400px; position: relative;
            padding: 45px 25px 25px 25px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            text-align: right; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-top-icon {
            position: absolute; top: -35px; left: 50%; transform: translateX(-50%);
            background: var(--accent); width: 70px; height: 70px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; color: white; border: 4px solid #1a1a1a;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.4);
        }

        .modal-title { color: #ffffff; font-size: 1.3rem; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .modal-body-text { color: var(--text-gray); font-size: 0.9rem; line-height: 1.6; margin-bottom: 20px; }
        .info-row { display: flex; gap: 12px; margin-bottom: 12px; align-items: flex-start; }
        .info-icon { color: var(--accent); font-size: 1rem; margin-top: 3px; width: 20px; text-align: center; }
        .info-text { flex: 1; }
        .info-label { color: #888; font-size: 0.75rem; display: block; margin-bottom: 2px;}
        .info-val { color: #e4e4e7; font-size: 0.9rem; word-break: break-word;}

        .modal-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; }
        .close-txt-btn { background: transparent; border: none; color: #888; cursor: pointer; font-size: 0.9rem; font-weight: bold; transition: 0.3s; }
        .close-txt-btn:hover { color: #fff; text-decoration: underline; }
        .apply-btn {
            background: var(--accent); color: white; border: none; padding: 10px 25px; border-radius: 12px;
            text-decoration: none; font-weight: bold; font-size: 0.9rem; transition: 0.3s;
            box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3);
        }
        .apply-btn:hover { background: #1d4ed8; transform: translateY(-2px); }

        @-webkit-keyframes fadeInUp { from { opacity: 0; -webkit-transform: translateY(15px); } to { opacity: 1; -webkit-transform: translateY(0); } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        /* --- تحسينات الجوال المتقدمة (هنا تم حل المشكلة) --- */
        @media (max-width: 600px) {
            .header-section { padding: 20px; padding-top: 60px; }
            .header-section h1 { font-size: 1.4rem; }
            .back-btn { top: 15px; right: 15px; width: 35px; height: 35px; font-size: 0.9rem; }
            
            /* إجبار الشبكة على عرض كرتين جنب بعض في الجوال */
            .companies-grid { 
                grid-template-columns: repeat(2, 1fr); 
                gap: 12px; 
            }
            
            /* تصغير الكروت لتناسب الشاشة */
            .company-card {
                padding: 15px 10px;
                border-radius: 16px;
            }
            .company-icon { font-size: 1.6rem; margin-bottom: 8px; }
            .company-name { font-size: 0.9rem; margin-bottom: 3px; }
            .company-tag { font-size: 0.7rem; }
            
            .main-container { width: 92%; margin: 20px 0; }
            .filters-container { gap: 8px; }
            .filter-btn { padding: 6px 12px; font-size: 0.8rem; }
            .footer-info { flex-direction: column; text-align: center; justify-content: center; }
        }
    </style>
</head>

        db.sort(function(a, b) { return a.t > b.t ? 1 : -1; });

        function render(filter) {
            const grid = document.getElementById('dataGrid');
            grid.innerHTML = '';
            
            const filteredData = db.filter(function(x) { return filter === 'all' || x.c === filter; });
            
            filteredData.forEach(function(item) {
                const card = document.createElement('div');
                card.className = 'company-card';
                card.onclick = function() { openModal(item); };
                card.innerHTML = '<div class="company-icon"><i class="fa-solid ' + item.i + '"></i></div><div class="company-name">' + item.t + '</div><div class="company-tag">' + item.l + '</div>';
                grid.appendChild(card);
            });
        }

        function filterData(btnElement, cat) {
            const buttons = document.querySelectorAll('.filter-btn');
            for(let i=0; i<buttons.length; i++) {
                buttons[i].classList.remove('active');
            }
            btnElement.classList.add('active');
            render(cat);
        }

        function openModal(item) {
            document.getElementById('mTopIcon').innerHTML = '<i class="fa-solid ' + item.i + '"></i>';
            document.getElementById('mTitle').innerText = item.t;
            document.getElementById('mLoc').innerText = item.l;
            
            let contactText = item.e;
            let linkHref = "#";
            
            if (item.e.indexOf('@') !== -1) {
                contactText = '<a href="mailto:' + item.e + '" style="color:var(--accent); text-decoration:none;">' + item.e + '</a>';
                linkHref = 'mailto:' + item.e;
                document.getElementById('mBtn').innerText = "إرسال إيميل للتقديم";
            } else if (item.e.indexOf('http') === 0) {
                contactText = '<a href="' + item.e + '" target="_blank" style="color:var(--accent); text-decoration:none;">رابط بوابة التقديم</a>';
                linkHref = item.e;
                document.getElementById('mBtn').innerText = "الذهاب للتقديم";
            } else {
                contactText = item.e;
                linkHref = 'https://www.google.com/search?q=التدريب+التعاوني+' + item.t;
                document.getElementById('mBtn').innerText = "البحث في جوجل";
            }

            document.getElementById('mContact').innerHTML = contactText;
            document.getElementById('mMajors').innerText = item.m || 'حسب الشواغر المتاحة';
            
            const btn = document.getElementById('mBtn');
            btn.href = linkHref;

            const modal = document.getElementById('infoModal');
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function closeModal(event, isButton) {
            const modal = document.getElementById('infoModal');
            if (isButton || !event || event.target === modal) {
                modal.style.display = 'none';
                document.body.style.overflow = 'auto';
            }
        }

        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        let width, height, stars = [];
        function initStars() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; stars = []; for(let i=0; i<100; i++) stars.push({x:Math.random()*width, y:Math.random()*height, r:Math.random()*1.5, d:Math.random()*0.5+0.1}); }
        function drawStars() { ctx.clearRect(0,0,width,height); ctx.fillStyle="rgba(255,255,255,0.7)"; stars.forEach(function(s){ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); s.y-=s.d; if(s.y<0)s.y=height;}); requestAnimationFrame(drawStars); }
        window.addEventListener('resize', initStars); initStars(); drawStars();

        render('all');
